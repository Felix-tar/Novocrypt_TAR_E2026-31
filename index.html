<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Solana Memo Viewer</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: 40px auto;
      padding: 20px;
      line-height: 1.5;
      word-break: break-word;
    }
    .box {
      border: 1px solid #ccc;
      border-radius: 10px;
      padding: 16px;
      background: #f8f8f8;
      white-space: pre-wrap;
    }
    .muted {
      color: #666;
      font-size: 14px;
    }
    h1 {
      margin-top: 0;
    }
  </style>
</head>
<body>
  <h1>Memo-Rohdaten</h1>
  <p class="muted">Diese Seite lädt direkt die Transaktion von Solana und zeigt nur das Memo an.</p>

  <div id="status">Lade …</div>
  <div id="memo" class="box" style="display:none;"></div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const sig = params.get("sig");

    const statusEl = document.getElementById("status");
    const memoEl = document.getElementById("memo");

    async function loadMemo() {
      if (!sig) {
        statusEl.textContent = "Fehler: Keine Signatur in der URL. Verwende ?sig=...";
        return;
      }

      try {
        const response = await fetch("https://api.mainnet-beta.solana.com", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            jsonrpc: "2.0",
            id: 1,
            method: "getTransaction",
            params: [
              sig,
              {
                encoding: "jsonParsed",
                commitment: "finalized",
                maxSupportedTransactionVersion: 0
              }
            ]
          })
        });

        const data = await response.json();

        if (!data.result) {
          statusEl.textContent = "Keine Transaktionsdaten gefunden.";
          return;
        }

        const logs = data.result?.meta?.logMessages || [];
        const memoLogs = logs.filter(line => line.includes("Program log: Memo"));

        if (memoLogs.length > 0) {
          statusEl.textContent = "Memo gefunden:";
          memoEl.style.display = "block";
          memoEl.textContent = memoLogs.join("\n");
          return;
        }

        statusEl.textContent = "Kein Memo in den Log-Messages gefunden.";
      } catch (err) {
        statusEl.textContent = "Fehler beim Laden: " + err.message;
      }
    }

    loadMemo();
  </script>
</body>
</html>
