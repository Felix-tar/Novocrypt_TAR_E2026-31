<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Solana Memo Viewer</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 1000px;
      margin: 40px auto;
      padding: 20px;
      line-height: 1.5;
      word-break: break-word;
    }
    h1 { margin-top: 0; }
    .muted { color: #666; }
    .box {
      border: 1px solid #ccc;
      border-radius: 10px;
      padding: 16px;
      background: #f8f8f8;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }
    .small {
      font-size: 14px;
      color: #666;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <h1>Memo-Rohdaten</h1>
  <p class="muted">Direkte Anzeige der Memo-Daten aus einer Solana-Transaktion.</p>

  <div id="status">Lade …</div>
  <div id="memo" class="box" style="display:none;"></div>
  <div id="meta" class="small"></div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const sig = params.get("sig");

    const statusEl = document.getElementById("status");
    const memoEl = document.getElementById("memo");
    const metaEl = document.getElementById("meta");

    const RPCS = [
      "https://api.mainnet-beta.solana.com",
      "https://rpc.ankr.com/solana"
    ];

    const MEMO_PROGRAMS = new Set([
      "MemoSq4gqABAXKb96qnH8TysNcWxMyWCqXgDLGmfcHr",
      "Memo1UhkJRfHyvLMcVucJwxXeuD728EqVDDwQDxFMNo"
    ]);

    const BASE58_ALPHABET = "123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz";

    function base58Decode(str) {
      if (!str || typeof str !== "string") return new Uint8Array();

      const bytes = [0];
      for (let i = 0; i < str.length; i++) {
        const c = str[i];
        const value = BASE58_ALPHABET.indexOf(c);
        if (value < 0) throw new Error("Ungültiges Base58-Zeichen: " + c);

        let carry = value;
        for (let j = 0; j < bytes.length; ++j) {
          carry += bytes[j] * 58;
          bytes[j] = carry & 0xff;
          carry >>= 8;
        }
        while (carry > 0) {
          bytes.push(carry & 0xff);
          carry >>= 8;
        }
      }

      for (let i = 0; i < str.length && str[i] === "1"; i++) {
        bytes.push(0);
      }

      return new Uint8Array(bytes.reverse());
    }

    function utf8FromBytes(bytes) {
      return new TextDecoder("utf-8", { fatal: false }).decode(bytes);
    }

    function extractFromLogs(tx) {
      const logs = tx?.meta?.logMessages || [];
      const hits = logs
        .filter(line => line.includes("Program log: Memo"))
        .map(line => line.replace(/^.*Program log: Memo[: ]?/, "").trim())
        .filter(Boolean);

      return hits.length ? hits.join("\n") : null;
    }

    function extractFromInstructions(tx) {
      const msg = tx?.transaction?.message;
      if (!msg) return null;

      const accountKeys = msg.accountKeys || [];
      const instructions = msg.instructions || [];

      for (const ix of instructions) {
        let programId = null;

        if (typeof ix.programId === "string") {
          programId = ix.programId;
        } else if (typeof ix.programIdIndex === "number" && accountKeys[ix.programIdIndex]) {
          const key = accountKeys[ix.programIdIndex];
          programId = typeof key === "string" ? key : key.pubkey;
        }

        if (!programId || !MEMO_PROGRAMS.has(programId)) continue;

        if (typeof ix.data === "string" && ix.data.length > 0) {
          try {
            return utf8FromBytes(base58Decode(ix.data));
          } catch (e) {
            return "[Memo-Instruktion gefunden, aber Base58-Decodierung fehlgeschlagen]\n" + ix.data;
          }
        }

        if (typeof ix.parsed === "string") {
          return ix.parsed;
        }
      }

      return null;
    }

    async function fetchTransaction(rpcUrl) {
      const res = await fetch(rpcUrl, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          jsonrpc: "2.0",
          id: 1,
          method: "getTransaction",
          params: [
            sig,
            {
              encoding: "json",
              commitment: "confirmed",
              maxSupportedTransactionVersion: 0
            }
          ]
        })
      });

      if (!res.ok) {
        throw new Error(`HTTP ${res.status} bei ${rpcUrl}`);
      }

      const json = await res.json();

      if (json.error) {
        throw new Error(`${rpcUrl}: ${json.error.message || "RPC-Fehler"}`);
      }

      return json.result;
    }

    async function loadMemo() {
      if (!sig) {
        statusEl.textContent = "Fehler: Keine Signatur angegeben. Verwende ?sig=...";
        return;
      }

      let tx = null;
      let usedRpc = null;
      let lastError = null;

      for (const rpc of RPCS) {
        try {
          const result = await fetchTransaction(rpc);
          if (result) {
            tx = result;
            usedRpc = rpc;
            break;
          }
        } catch (err) {
          lastError = err;
        }
      }

      if (!tx) {
        statusEl.textContent = "Transaktion konnte über die getesteten RPC-Endpunkte nicht geladen werden.";
        metaEl.textContent = lastError ? String(lastError) : "Kein Ergebnis erhalten.";
        return;
      }

      const memoFromInstruction = extractFromInstructions(tx);
      const memoFromLogs = extractFromLogs(tx);
      const memo = memoFromInstruction || memoFromLogs;

      if (!memo) {
        statusEl.textContent = "Transaktion geladen, aber kein Memo gefunden.";
        metaEl.textContent = `RPC: ${usedRpc}`;
        return;
      }

      statusEl.textContent = "Memo gefunden:";
      memoEl.style.display = "block";
      memoEl.textContent = memo;

      const slot = tx.slot ?? "-";
      const blockTime = tx.blockTime
        ? new Date(tx.blockTime * 1000).toLocaleString("de-DE")
        : "-";

      metaEl.textContent = `RPC: ${usedRpc} | Slot: ${slot} | Zeit: ${blockTime}`;
    }

    loadMemo().catch(err => {
      statusEl.textContent = "Fehler beim Laden.";
      metaEl.textContent = String(err);
    });
  </script>
</body>
</html>
